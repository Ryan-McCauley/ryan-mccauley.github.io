<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Prose becomes execution">
  <defs>
    <radialGradient id="asBg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0a1c22"/>
      <stop offset="55%" stop-color="#040d11"/>
      <stop offset="100%" stop-color="#010606"/>
    </radialGradient>
    <linearGradient id="asFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#92e4ef"/>
      <stop offset="55%" stop-color="#5fe6c0"/>
      <stop offset="100%" stop-color="#7ef0a0"/>
    </linearGradient>
    <linearGradient id="asCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92e4ef"/>
      <stop offset="100%" stop-color="#49e0f4"/>
    </linearGradient>
    <filter id="asGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#asBg)"/>
  <g stroke="#123038" stroke-width="1" opacity="0.45">
    <path d="M0 120H600M0 240H600M0 360H600M0 480H600"/>
    <path d="M120 0V600M240 0V600M360 0V600M480 0V600"/>
  </g>

  <!-- LEFT: the strategy document -->
  <g transform="translate(70,150)">
    <rect x="0" y="0" width="160" height="210" rx="10" fill="#0c2027" stroke="#1c3d45" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="34" rx="10" fill="#123038"/>
    <text x="16" y="23" font-family="Menlo,monospace" font-size="14" fill="#92e4ef"># Firecracker</text>
    <g fill="#2a6b78">
      <rect x="16" y="52" width="120" height="8" rx="4"/>
      <rect x="16" y="72" width="96" height="8" rx="4"/>
      <rect x="16" y="92" width="128" height="8" rx="4"/>
      <rect x="16" y="112" width="80" height="8" rx="4"/>
    </g>
    <g fill="#49e0f4">
      <rect x="16" y="140" width="14" height="8" rx="4"/><rect x="38" y="140" width="98" height="8" rx="4" fill="#2a6b78"/>
      <rect x="16" y="160" width="14" height="8" rx="4"/><rect x="38" y="160" width="82" height="8" rx="4" fill="#2a6b78"/>
      <rect x="16" y="180" width="14" height="8" rx="4"/><rect x="38" y="180" width="106" height="8" rx="4" fill="#2a6b78"/>
    </g>
  </g>

  <!-- FLOW: prose transforms into execution -->
  <g filter="url(#asGlow)">
    <path d="M242 255 C 300 255, 300 300, 360 300" fill="none" stroke="url(#asFlow)" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>
    <path d="M242 285 C 300 285, 300 300, 360 300" fill="none" stroke="url(#asFlow)" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>
  </g>
  <!-- agent node -->
  <g filter="url(#asGlow)" transform="translate(300,300)">
    <circle r="26" fill="#08171c" stroke="url(#asCyan)" stroke-width="3"/>
    <circle r="7" fill="url(#asCyan)"/>
    <circle cx="0" cy="-26" r="4" fill="#7ef0a0"/>
    <circle cx="22" cy="14" r="4" fill="#7ef0a0"/>
    <circle cx="-22" cy="14" r="4" fill="#7ef0a0"/>
  </g>

  <!-- RIGHT: the executed trade — rising candles + arrow -->
  <g transform="translate(360,150)">
    <rect x="0" y="0" width="170" height="210" rx="10" fill="#0c2027" stroke="#1c3d45" stroke-width="2"/>
    <!-- rising trend line -->
    <path d="M18 170 L54 150 L90 158 L126 118 L152 78" fill="none" stroke="url(#asFlow)" stroke-width="2.5" opacity="0.7"/>
    <g stroke-width="8">
      <line x1="30" y1="120" x2="30" y2="178" stroke="#49e0f4"/><rect x="24" y="140" width="12" height="26" fill="#49e0f4"/>
      <line x1="60" y1="108" x2="60" y2="168" stroke="#7ef0a0"/><rect x="54" y="124" width="12" height="30" fill="#7ef0a0"/>
      <line x1="90" y1="98" x2="90" y2="160" stroke="#7ef0a0"/><rect x="84" y="112" width="12" height="34" fill="#7ef0a0"/>
      <line x1="120" y1="74" x2="120" y2="150" stroke="#7ef0a0"/><rect x="114" y="90" width="12" height="42" fill="#7ef0a0"/>
    </g>
    <!-- up arrow -->
    <g transform="translate(146,66)" fill="#7ef0a0" filter="url(#asGlow)">
      <path d="M0 -14 L14 6 L4 6 L4 22 L-4 22 L-4 6 L-14 6 Z"/>
    </g>
  </g>

  <rect x="60" y="548" width="150" height="6" rx="3" fill="url(#asFlow)"/>
  <rect x="222" y="548" width="70" height="6" rx="3" fill="#1c3d45"/>
</svg>
