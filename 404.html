<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ryan McCauley</title>
    <!-- Single Page Apps for GitHub Pages: redirect unknown paths into
         index.html with the original path encoded in the query string, so
         client-side routes (e.g. /blog/:slug) resolve instead of 404ing.
         pathSegmentsToKeep = 0 because the site is served at the domain root.
         https://github.com/rafgraph/spa-github-pages -->
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
